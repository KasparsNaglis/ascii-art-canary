<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .section { display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; }
  .bird-section { background: #113D38; }
  .feather1-section { background: #FFFFFF; }
  .flying-section { background: #113D38; }
  canvas { display: block; max-width: 100vw; max-height: 100vh; touch-action: none; }
  .controls {
    position: absolute;
    top: 16px;
    right: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    z-index: 10;
  }
  .controls .group { display: flex; align-items: center; gap: 8px; }
  .bird-section .controls {
    background: rgba(255,255,255,0.1);
    color: #F4F27B;
  }
  .feather1-section .controls {
    background: rgba(0,0,0,0.08);
    color: #113D38;
  }
  .flying-section .controls {
    background: rgba(255,255,255,0.1);
    color: #F4F27B;
  }
  .controls input[type="range"] {
    width: 120px;
    cursor: pointer;
  }
  .controls .val {
    min-width: 28px;
    text-align: right;
  }
</style>
</head>
<body>
<div class="section bird-section">
  <div class="controls">
    <div class="group"><label>gamma</label><input type="range" id="bird-gamma" min="0.1" max="8" step="0.1" value="1.0"><span class="val" id="bird-gamma-val">1.0</span></div>
    <div class="group"><label>contrast</label><input type="range" id="bird-contrast" min="0" max="10" step="0.1" value="10"><span class="val" id="bird-contrast-val">10</span></div>
  </div>
  <canvas id="bird" role="img" aria-label="ASCII art of a canary bird"></canvas>
</div>
<div class="section feather1-section">
  <div class="controls">
    <div class="group"><label>gamma</label><input type="range" id="feather1-gamma" min="0.1" max="8" step="0.1" value="2.1"><span class="val" id="feather1-gamma-val">2.1</span></div>
    <div class="group"><label>contrast</label><input type="range" id="feather1-contrast" min="0" max="10" step="0.1" value="5.6"><span class="val" id="feather1-contrast-val">5.6</span></div>
  </div>
  <canvas id="feather1" role="img" aria-label="ASCII art of a feather"></canvas>
</div>
<div class="section flying-section">
  <div class="controls">
    <div class="group"><label>gamma</label><input type="range" id="flying-gamma" min="0.1" max="8" step="0.1" value="1.0"><span class="val" id="flying-gamma-val">1.0</span></div>
    <div class="group"><label>contrast</label><input type="range" id="flying-contrast" min="0" max="10" step="0.1" value="10"><span class="val" id="flying-contrast-val">10</span></div>
  </div>
  <canvas id="flying" role="img" aria-label="ASCII art of flying canaries"></canvas>
</div>
<script>
const CHARS = "ATGCatgc";

function initAsciiCanvas(canvasId, grid, config) {
  const { cols, rows, cw, ch, bg, shadow, highlight, radius = 120, force = 40, gammaSlider, gammaVal, contrastSlider, contrastVal, sizeMode = false, minFont = 2, maxFont = 12 } = config;
  const canvas = document.getElementById(canvasId);
  const W = cols * cw;
  const H = rows * ch;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  let gamma = parseFloat(gammaSlider.value);
  gammaSlider.addEventListener('input', () => {
    gamma = parseFloat(gammaSlider.value);
    gammaVal.textContent = gamma.toFixed(1);
  });

  let contrast = parseFloat(contrastSlider.value);
  contrastSlider.addEventListener('input', () => {
    contrast = parseFloat(contrastSlider.value);
    contrastVal.textContent = contrast.toFixed(1);
  });

  let mx = -9999, my = -9999;
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (W / r.width);
    my = (e.clientY - r.top) * (H / r.height);
  });
  canvas.addEventListener('pointerleave', () => { mx = -9999; my = -9999; });

  // Ripple system
  const ripples = [];
  const RIPPLE_SPEED = 8;
  const RIPPLE_WIDTH = 60;
  const RIPPLE_MAX = 400;
  const RIPPLE_FORCE = 25;

  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    ripples.push({
      x: (e.clientX - r.left) * (W / r.width),
      y: (e.clientY - r.top) * (H / r.height),
      radius: 0,
      life: 1,
    });
  });

  const offX = new Float32Array(cols * rows);
  const offY = new Float32Array(cols * rows);
  const charState = grid.map(c => c ? c[0] : null);

  function lerp(a, b, t) { return a + (b - a) * t; }

  let isVisible = true;
  const observer = new IntersectionObserver(([entry]) => {
    const wasVisible = isVisible;
    isVisible = entry.isIntersecting;
    if (isVisible && !wasVisible) requestAnimationFrame(draw);
  });
  observer.observe(canvas);

  function draw() {
    if (!isVisible) return;
    ctx.fillStyle = `rgb(${bg[0]},${bg[1]},${bg[2]})`;
    ctx.fillRect(0, 0, W, H);
    if (!sizeMode) ctx.font = '10px monospace';
    ctx.textBaseline = 'top';

    // Update ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].radius += RIPPLE_SPEED;
      ripples[i].life = 1 - ripples[i].radius / RIPPLE_MAX;
      if (ripples[i].life <= 0) ripples.splice(i, 1);
    }

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const idx = row * cols + col;
        const cell = grid[idx];
        if (!cell) continue;

        const baseX = col * cw;
        const baseY = row * ch;
        const cx = baseX + cw / 2;
        const cy = baseY + ch / 2;

        // Hover push
        const dx = cx - mx;
        const dy = cy - my;
        const dist = Math.sqrt(dx * dx + dy * dy);

        let targetX = 0, targetY = 0;
        let shouldScramble = false;

        if (dist < radius && dist > 0) {
          const t = 1 - dist / radius;
          const f = t * t * force;
          const angle = Math.atan2(dy, dx);
          targetX += Math.cos(angle) * f;
          targetY += Math.sin(angle) * f;
          if (t > 0.3) shouldScramble = true;
        }

        // Ripple push
        let rippleGlow = 0;
        for (const rip of ripples) {
          const rdx = cx - rip.x;
          const rdy = cy - rip.y;
          const rdist = Math.sqrt(rdx * rdx + rdy * rdy);
          const ringDist = Math.abs(rdist - rip.radius);

          if (ringDist < RIPPLE_WIDTH) {
            const intensity = (1 - ringDist / RIPPLE_WIDTH) * rip.life;
            const angle = Math.atan2(rdy, rdx);
            targetX += Math.cos(angle) * RIPPLE_FORCE * intensity;
            targetY += Math.sin(angle) * RIPPLE_FORCE * intensity;
            rippleGlow = Math.max(rippleGlow, intensity);
            if (intensity > 0.3) shouldScramble = true;
          }
        }

        offX[idx] = lerp(offX[idx], targetX, 0.25);
        offY[idx] = lerp(offY[idx], targetY, 0.25);

        if (targetX === 0 && targetY === 0) {
          offX[idx] *= 0.85;
          offY[idx] *= 0.85;
        }

        if (shouldScramble && Math.random() < 0.4) {
          charState[idx] = CHARS[(Math.random() * CHARS.length) | 0];
        } else if (Math.abs(offX[idx]) < 0.5 && Math.abs(offY[idx]) < 0.5) {
          charState[idx] = cell[0];
        }

        const drawX = baseX + offX[idx];
        const drawY = baseY + offY[idx];

        // Apply gamma then contrast S-curve to raw t value
        const rawT = cell[1];
        let gammaT = Math.pow(rawT, gamma);
        // S-curve contrast: contrast=0 is no effect, higher = steeper
        if (contrast > 0) {
          gammaT = 1 / (1 + Math.exp(-contrast * (gammaT - 0.5)));
        }

        const pushDist = Math.sqrt(offX[idx] ** 2 + offY[idx] ** 2);
        const glow = Math.min(1, Math.max(pushDist / force, rippleGlow));

        if (sizeMode) {
          // Size mode: fixed color, variable font size
          const fontSize = lerp(minFont, maxFont, gammaT);
          ctx.font = `${Math.round(fontSize)}px monospace`;
          const glowTarget = shadow || highlight;
          const glowR = Math.round(lerp(highlight[0], glowTarget[0], glow * 0.6));
          const glowG = Math.round(lerp(highlight[1], glowTarget[1], glow * 0.6));
          const glowB = Math.round(lerp(highlight[2], glowTarget[2], glow * 0.6));
          ctx.fillStyle = `rgb(${glowR},${glowG},${glowB})`;
          // Center smaller chars within the cell
          const charW = ctx.measureText(charState[idx]).width;
          ctx.fillText(charState[idx], drawX + (cw - charW) / 2, drawY + (ch - fontSize) / 2);
        } else {
          // Color mode: fixed size, variable color
          const baseR = lerp(shadow[0], highlight[0], gammaT);
          const baseG = lerp(shadow[1], highlight[1], gammaT);
          const baseB = lerp(shadow[2], highlight[2], gammaT);
          const r = Math.round(lerp(baseR, highlight[0], glow * 0.6));
          const g = Math.round(lerp(baseG, highlight[1], glow * 0.6));
          const b = Math.round(lerp(baseB, highlight[2], glow * 0.6));
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillText(charState[idx], drawX, drawY);
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// Load grid datasets
Promise.all([
  fetch('data/grid-data.json').then(r => r.json()),
  fetch('data/feather1-grid-data.json').then(r => r.json()),
  fetch('data/flying-grid-data.json').then(r => r.json()),
]).then(([birdData, f1Data, flyData]) => {
  initAsciiCanvas('bird', birdData.cells, {
    cols: birdData.cols, rows: birdData.rows,
    cw: birdData.cellWidth, ch: birdData.cellHeight,
    bg: [0x11, 0x3D, 0x38],
    shadow: [0x11, 0x3D, 0x38],
    highlight: [0xF4, 0xF2, 0x7B],
    gammaSlider: document.getElementById('bird-gamma'),
    gammaVal: document.getElementById('bird-gamma-val'),
    contrastSlider: document.getElementById('bird-contrast'),
    contrastVal: document.getElementById('bird-contrast-val'),
  });
  initAsciiCanvas('feather1', f1Data.cells, {
    cols: f1Data.cols, rows: f1Data.rows,
    cw: f1Data.cellWidth, ch: f1Data.cellHeight,
    bg: [255, 255, 255],
    shadow: [0xF4, 0xF2, 0x7B],
    highlight: [0x11, 0x3D, 0x38],
    sizeMode: true,
    gammaSlider: document.getElementById('feather1-gamma'),
    gammaVal: document.getElementById('feather1-gamma-val'),
    contrastSlider: document.getElementById('feather1-contrast'),
    contrastVal: document.getElementById('feather1-contrast-val'),
  });
  initAsciiCanvas('flying', flyData.cells, {
    cols: flyData.cols, rows: flyData.rows,
    cw: flyData.cellWidth, ch: flyData.cellHeight,
    bg: [0x11, 0x3D, 0x38],
    shadow: [0x11, 0x3D, 0x38],
    highlight: [0xF4, 0xF2, 0x7B],
    gammaSlider: document.getElementById('flying-gamma'),
    gammaVal: document.getElementById('flying-gamma-val'),
    contrastSlider: document.getElementById('flying-contrast'),
    contrastVal: document.getElementById('flying-contrast-val'),
  });
}).catch(err => console.error('Failed to load grid data:', err));
</script>
</body>
</html>
